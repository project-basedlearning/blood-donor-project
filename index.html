<!DOCTYPE html>
<html>

<head>
<title>Blood Donor Finder</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:350px;
margin:20px auto;
padding:20px;
border-radius:10px;
}

button{
padding:8px;
background:red;
color:white;
border:none;
cursor:pointer;
}

</style>

<script>

function searchDonor() {
    let blood = document.getElementById("rblood").value;
    let city = document.getElementById("rcity").value;

    db.collection("donors")
    .get()
    .then((querySnapshot) => {
        let result = "";
        querySnapshot.forEach((doc) => {
            let d = doc.data();
            let id = doc.id;

            if(d.blood === blood && d.city.toLowerCase() === city.toLowerCase()){
                if(!d.request){
                    result += `
                        Donor: ${d.name}<br>
                        Blood: ${d.blood}<br>
                        City: ${d.city}<br>
                        Phone: Hidden<br>
                        <button onclick="sendRequest('${id}')">Request Blood</button><br><br>
                    `;
                } else if(d.request && !d.accepted){
                    result += `Request sent to ${d.name} (Waiting for donor approval)<br><br>`;
                } else if(d.accepted){
                    result += `
                        Donor: ${d.name}<br>
                        Blood: ${d.blood}<br>
                        City: ${d.city}<br>
                        Phone: ${d.phone}<br>
                        You can call the donor<br><br>
                    `;
                }
            }
        });
        document.getElementById("result").innerHTML = result;
    })
    .catch((error) => {
        console.error("Error searching donors: ", error);
    });
}

function sendRequest(docId){
    db.collection("donors").doc(docId).update({
        request: true
    })
    .then(() => {
        alert("Request sent to donor!");
        showDonorPanel();
        searchDonor();
    })
    .catch((error) => {
        console.error("Error sending request: ", error);
    });
}


function showDonorPanel() {
    db.collection("donors")
    .where("request", "==", true)
    .where("accepted", "==", false)
      .onSnapshot((querySnapshot) => {
          let panel = "";
          querySnapshot.forEach((doc) => {
              let d = doc.data();
              let id = doc.id;
              panel += `
                  Request received for ${d.name}<br>
                  <button onclick="acceptRequest('${id}')">Accept Request</button><br><br>
              `;
          });
          document.getElementById("donorPanel").innerHTML = panel;
      });
}
}
  
function acceptRequest(docId){
    db.collection("donors").doc(docId).update({
        accepted: true
    })
    .then(() => {
        alert("Donor accepted the request!");
        showDonorPanel(); // refresh donor view
        searchDonor();    // refresh receiver search results
    })
    .catch((error) => {
        console.error("Error accepting request: ", error);
    });
}

</script>

</head>

<body>

<h1>Blood Donor Finder</h1>

<div class="box">

<h3>Donor Registration</h3>

<input id="name" placeholder="Name"><br><br>
<input id="blood" placeholder="Blood Group"><br><br>
<input id="city" placeholder="City"><br><br>
<input id="phone" placeholder="Phone Number"><br><br>

<button onclick="registerDonor()">Register</button>

</div>

<div class="box">

<h3>Receiver Search</h3>

<input id="rblood" placeholder="Blood Group"><br><br>
<input id="rcity" placeholder="City"><br><br>

<button onclick="searchDonor()">Search</button>

<p id="result"></p>

</div>

<div class="box">

<h3>Donor Request Panel</h3>

<p id="donorPanel"></p>

</div> 
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyC4bdhhxPqGl9d5pkJlSZpvV03N1s0IoLg",
  authDomain: "blood-donor-finder-b72e9.firebaseapp.com",
  projectId: "blood-donor-finder-b72e9",
  storageBucket: "blood-donor-finder-b72e9.firebasestorage.app",
  messagingSenderId: "80536712428",
  appId: "1:80536712428:web:f928218e42603b294061c9"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function registerDonor() {

  var name = document.getElementById("name").value;
  var blood = document.getElementById("blood").value;
  var city = document.getElementById("city").value;
  var phone = document.getElementById("phone").value;

  db.collection("donors").add({
    name: name,
    blood: blood,
    city: city,
    phone: phone
  })
  .then(function() {
    alert("Donor Registered Successfully!");
  })
  .catch(function(error) {
    alert("Error: " + error);
  });

}

</script>

</body>
</html>
