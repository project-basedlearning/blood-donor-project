<!DOCTYPE html>
<html>

<head>
<title>Blood Donor Finder</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:350px;
margin:20px auto;
padding:20px;
border-radius:10px;
}

button{
padding:8px;
background:red;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Blood Donor Finder</h1>

<div class="box">

<h3>Donor Registration</h3>

<input id="name" placeholder="Name"><br><br>
<input id="blood" placeholder="Blood Group"><br><br>
<input id="city" placeholder="City"><br><br>
<input id="phone" placeholder="Phone Number"><br><br>

<button onclick="registerDonor()">Register</button>

</div>

<div class="box">

<h3>Receiver Search</h3>

<input id="rblood" placeholder="Blood Group"><br><br>
<input id="rcity" placeholder="City"><br><br>

<button onclick="searchDonor()">Search</button>

<p id="result"></p>

</div>

<div class="box">
<button onclick="showDonorPanel()">Check Requests</button>

<h3>Donor Request Panel</h3>

<p id="donorPanel"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔴 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyC4bdhhxPqGl9d5pkJlSZpvV03N1s0IoLg",
  authDomain: "blood-donor-finder-b72e9.firebaseapp.com",
  projectId: "blood-donor-finder-b72e9",
  storageBucket: "blood-donor-finder-b72e9.firebasestorage.app",
  messagingSenderId: "80536712428",
  appId: "1:80536712428:web:f928218e42603b294061c9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🟢 TIME SETTINGS (change easily)
const DISPLAY_MINUTES = 2;   // phone visible time
const COOLDOWN_MINUTES = 1;  // donor hidden time

// 🔵 REGISTER
function registerDonor() {
  alert("Button clicked");

  let name = document.getElementById("name").value;
  let blood = document.getElementById("blood").value.toLowerCase().trim();
  let city = document.getElementById("city").value.toLowerCase().trim();
  let phone = document.getElementById("phone").value;

  db.collection("donors").add({
    name: name,
    blood: blood,
    city: city,
    phone: phone,
    request: false,
    accepted: false,
    lastDonated: 0
  })
  .then(() => alert("Donor Registered!"));
}

// 🔵 SEARCH (REAL-TIME)
function searchDonor() {

    let blood = document.getElementById("rblood").value.toLowerCase().trim();
    let city = document.getElementById("rcity").value.toLowerCase().trim();

    db.collection("donors").onSnapshot((snapshot) => {

        let result = "";
        let now = Date.now();

        snapshot.forEach((doc) => {

            let d = doc.data();
            let id = doc.id;

            let last = d.lastDonated || 0;

            let displayTime = DISPLAY_MINUTES * 60 * 1000;
            let cooldownTime = COOLDOWN_MINUTES * 60 * 1000;

            let timePassed = now - last;

            // 🔴 RESET after display time
            if(d.accepted && timePassed > displayTime){
                db.collection("donors").doc(id).update({
                    request: false,
                    accepted: false
                });
                return;
            }
           
          
            // 🟢 SHOW phone FIRST (for display time)
            if(d.request && d.accepted && timePassed <= displayTime){

              result += `
              Donor: ${d.name}<br>
              Blood: ${d.blood}<br>
              City: ${d.city}<br>
              Phone: ${d.phone}<br>
              You can call the donor<br><br>
             `;
              return;
            }
            // 🔴 HIDE donor during cooldown (after display time)
           if(d.accepted && timePassed > displayTime && timePassed < cooldownTime){
              return;
            }
            

            // 🔴 FILTER MATCH
            if(
               d.blood &&
               d.city &&
               d.blood === blood &&
               d.city === city
            ){

                // CASE 1: Fresh donor
                if(!d.request && timePassed > cooldownTime){

                    result += `
                    Donor: ${d.name}<br>
                    Blood: ${d.blood}<br>
                    City: ${d.city}<br>
                    Phone: Hidden<br>
                    <button onclick="sendRequest('${id}')">Request Blood</button><br><br>
                    `;
                }

                // CASE 2: Waiting
                else if(d.request && !d.accepted){

                    result += `Request sent to ${d.name} (Waiting for donor approval)<br><br>`;
                }

                // CASE 3: Accepted (only visible time)
                else if(d.request && d.accepted && timePassed <= displayTime){

                    result += `
                    Donor: ${d.name}<br>
                    Blood: ${d.blood}<br>
                    City: ${d.city}<br>
                    Phone: ${d.phone}<br>
                    You can call the donor<br><br>
                    `;
                }
            }

        });

        if(result === "") result = "No donors found";

        document.getElementById("result").innerHTML = result;

    });
}

// 🔵 SEND REQUEST
function sendRequest(id){
    db.collection("donors").doc(id).update({
        request: true,
        accepted: false
    })
    .then(() => alert("Request sent!"));
}

// 🔵 DONOR PANEL
function showDonorPanel(){

    db.collection("donors")
    .where("request","==",true)
    .onSnapshot((snapshot) => {

        let panel = "";

        snapshot.forEach((doc) => {

            let d = doc.data();
            let id = doc.id;

            if(!d.accepted){
                panel += `
                Request for ${d.name}<br>
                <button onclick="acceptRequest('${id}')">Accept</button><br><br>
                `;
            }
        });

        if(panel === "") panel = "No requests";

        document.getElementById("donorPanel").innerHTML = panel;
    });
}

// 🔵 ACCEPT
function acceptRequest(id){

    db.collection("donors").doc(id).update({
        accepted: true,
        lastDonated: Date.now()
    })
    .then(() => alert("Accepted!"));
}

</script>

</body>
</html>
