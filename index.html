<!DOCTYPE html>
<html>

<head>
<title>Blood Donor Finder</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:350px;
margin:20px auto;
padding:20px;
border-radius:10px;
}

button{
padding:8px;
background:red;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Blood Donor Finder</h1>

<div class="box">

<h3>Donor Registration</h3>

<input id="name" placeholder="Name"><br><br>
<input id="blood" placeholder="Blood Group"><br><br>
<input id="city" placeholder="City"><br><br>
<input id="phone" placeholder="Phone Number"><br><br>

<button onclick="registerDonor()">Register</button>

</div>

<div class="box">

<h3>Receiver Search</h3>

<input id="rblood" placeholder="Blood Group"><br><br>
<input id="rcity" placeholder="City"><br><br>

<button onclick="searchDonor()">Search</button>

<p id="result"></p>

</div>

<div class="box">
<button onclick="showDonorPanel()">Check Requests</button>

<h3>Donor Request Panel</h3>

<p id="donorPanel"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔴 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAw76ZENwkGzr0VvMb9O6JWDEqyuadGCFM",
  authDomain: "blood-donor-finder-52094.firebaseapp.com",
  projectId: "blood-donor-finder-52094",
  storageBucket: "blood-donor-finder-52094.firebasestorage.app",
  messagingSenderId: "111170772462",
  appId: "1:111170772462:web:d0dd3d17ce141f3c6482ff",
  measurementId: "G-L7VY909J8Q"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let unsubscribeSearch = null;

// 🟢 TIME SETTINGS (change easily)
const DISPLAY_MINUTES = 1;   // phone visible time
const COOLDOWN_MINUTES = 2;  // donor hidden time

// 🔵 REGISTER
function registerDonor() {
  alert("Button clicked");

  let name = document.getElementById("name").value;
  let blood = document.getElementById("blood").value.toLowerCase().trim();
  let city = document.getElementById("city").value.toLowerCase().trim();
  let phone = document.getElementById("phone").value;

  db.collection("donors").add({
    name,
    blood,
    city,
    phone,
    request: false,
    accepted: false,
    lastDonated: 0
  })
  .then(() => {
    console.log("Saved successfully");
    alert("Donor Registered!");
})
  .catch((error) => {
    console.log("REGISTER ERROR:", error);
    alert("Error: " + error.message);
});
}
// 🔵 SEARCH (REAL-TIME)
function searchDonor() {

    let blood = document.getElementById("rblood").value.toLowerCase().trim();
    let city = document.getElementById("rcity").value.toLowerCase().trim();
    if (!blood || !city) {
    document.getElementById("result").innerHTML = "Please enter blood group and city";
    return;
    }
    if (unsubscribeSearch) unsubscribeSearch();
    console.log("Search started");
    unsubscribeSearch = db.collection("donors").onSnapshot((snapshot) => {

        let result = "";
        let now = Date.now();

        snapshot.forEach((doc) => {

            let d = doc.data();
            let id = doc.id;

            let last = d.lastDonated || 0;

            let displayTime = DISPLAY_MINUTES * 60 * 1000;
            let cooldownTime = COOLDOWN_MINUTES * 60 * 1000;

            let timePassed = now - last;

            // 🔴 RESET after display time
            if(d.accepted && timePassed > displayTime){
                db.collection("donors").doc(id).update({
                    request: false,
                    accepted: false
                });
                return;
            }
           
          
            // 🟢 SHOW phone FIRST (for display time)
            if(d.request && d.accepted && timePassed <= displayTime){

              result += `
              Donor: ${d.name}<br>
              Blood: ${d.blood}<br>
              City: ${d.city}<br>
              Phone: ${d.phone}<br>
              You can call the donor<br><br>
             `;
              return;
            }
            // 🔴 HIDE donor during cooldown (after display time)
           if(d.accepted && timePassed > displayTime && timePassed < cooldownTime){
              return;
            }
            

            // 🔴 FILTER MATCH
            if(
               d.blood &&
               d.city &&
               d.blood === blood &&
               d.city === city
            ){

                // CASE 1: Fresh donor
                if(!d.request && timePassed > cooldownTime){

                    result += `
                    Donor: ${d.name}<br>
                    Blood: ${d.blood}<br>
                    City: ${d.city}<br>
                    Phone: Hidden<br>
                    <button onclick="sendRequest('${id}')">Request Blood</button><br><br>
                    `;
                }

                // CASE 2: Waiting
                else if(d.request && !d.accepted){

                    result += `Request sent to ${d.name} (Waiting for donor approval)<br><br>`;
                }

                // CASE 3: Accepted (only visible time)
                else if(d.request && d.accepted && timePassed <= displayTime){

                    result += `
                    Donor: ${d.name}<br>
                    Blood: ${d.blood}<br>
                    City: ${d.city}<br>
                    Phone: ${d.phone}<br>
                    You can call the donor<br><br>
                    `;
                }
            }

        });

        if(result === "") result = "No donors found";

        document.getElementById("result").innerHTML =
            result || "No donors found";

    });
}

// 🔵 SEND REQUEST
function sendRequest(id){
    db.collection("donors").doc(id).update({
        request: true,
        accepted: false,
        requestedFor: id
    })
    .then(() => alert("Request sent!"));
}

// 🔵 DONOR PANEL
function showDonorPanel(){
    let phone = prompt("Enter your registered phone number");

    if(!phone) return;
    db.collection("donors")
    .where("request","==",true)
    .onSnapshot((snapshot) => {

        let panel = "";

        snapshot.forEach((doc) => {

            let d = doc.data();
            let id = doc.id;

            if(d.phone !== phone){
                return;
            }

            if(!d.accepted){
                panel += `
                Request for ${d.name}<br>
                <button onclick="acceptRequest('${id}')">Accept</button><br><br>
                `;
            }
        });

        if(panel === "") panel = "No requests";

        document.getElementById("donorPanel").innerHTML = panel;
    });
}

// 🔵 ACCEPT
function acceptRequest(id){

    db.collection("donors").doc(id).update({
        accepted: true,
        lastDonated: Date.now()
    })
    .then(() => alert("Accepted!"));
}

</script>

</body>
</html>
